<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0a0e27;
            color: #e4e4e7;
        }

        /* Top Navigation Bar */
        .top-nav {
            background-color: #151a30;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid #1e2542;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #3b82f6;
            margin-right: 40px;
            text-decoration: none;
        }

        .search-bar {
            flex: 1;
            max-width: 500px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 16px;
            background-color: #1e2542;
            border: 1px solid #2d3548;
            border-radius: 6px;
            color: #e4e4e7;
            font-size: 14px;
        }

        .search-bar input::placeholder {
            color: #6b7280;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            margin-left: auto;
        }

        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #3b82f6;
        }

        .main-content {
            margin-top: 60px;
            padding: 24px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 16px;
            color: #9ca3af;
        }

        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #1e2542;
            padding-bottom: 16px;
        }

        .filter-tab {
            padding: 8px 16px;
            background-color: transparent;
            border: 1px solid #2d3548;
            color: #9ca3af;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            background-color: #1e2542;
            color: #e4e4e7;
        }

        .filter-tab.active {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        /* Stock Cards Grid */
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stock-card {
            background-color: #151a30;
            border: 1px solid #1e2542;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .stock-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.1);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .stock-info {
            flex: 1;
        }

        .stock-symbol {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stock-name {
            font-size: 14px;
            color: #9ca3af;
        }

        .stock-logo {
            width: 48px;
            height: 48px;
            background-color: #1e2542;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #3b82f6;
        }

        .stock-price-section {
            margin-bottom: 16px;
        }

        .stock-price {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stock-change {
            font-size: 14px;
            font-weight: 600;
        }

        .positive {
            color: #10b981;
        }

        .negative {
            color: #ef4444;
        }

        .stock-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid #1e2542;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 600;
        }

        .table-container {
            background-color: #151a30;
            border-radius: 8px;
            border: 1px solid #1e2542;
            overflow-x: auto;
            margin-top: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #1a1f38;
            border-bottom: 1px solid #2d3548;
        }

        th {
            text-align: left;
            padding: 16px;
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid #1e2542;
        }

        tbody tr {
            transition: background-color 0.2s;
            cursor: pointer;
        }

        tbody tr:hover {
            background-color: #1a1f38;
        }

        .symbol-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mini-logo {
            width: 36px;
            height: 36px;
            background-color: #1e2542;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #3b82f6;
        }

        .symbol-info {
            display: flex;
            flex-direction: column;
        }

        .symbol-ticker {
            font-weight: 700;
            margin-bottom: 2px;
        }

        .symbol-name {
            font-size: 12px;
            color: #9ca3af;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .view-btn {
            padding: 8px 16px;
            background-color: #1e2542;
            border: 1px solid #2d3548;
            color: #9ca3af;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .view-btn:hover {
            background-color: #2d3548;
            color: #e4e4e7;
        }

        .view-btn.active {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .hidden {
            display: none;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #151a30;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d3548;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3d4558;
        }
    </style>
</head>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="stocks.html" class="active">Stocks</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Stocks</h1>
            <p class="page-subtitle">Track and analyze top performing stocks</p>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active">All Stocks</button>
        </div>

        <div class="view-toggle">
            <button class="view-btn active" id="gridViewBtn">Grid View</button>
        </div>

        <!-- Stock Cards Grid -->
        <div class="stocks-grid" id="gridView">
