<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data – Joseph Lurie</title>
    <style>
        :root {
            --bg: #070b18;
            --surface: #0f1628;
            --border: #1c2540;
            --border-bright: #2a3a6e;
            --accent: #3b82f6;
            --accent-dim: rgba(59,130,246,0.12);
            --green: #22d3a0;
            --red: #f43f5e;
            --text: #e2e8f0;
            --muted: #64748b;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* NAV */
        .top-nav {
            background: #151a30;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }
        .logo {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            margin-right: 40px;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 24px; margin-left: auto; }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        /* MAIN */
        .main-content {
            margin-top: 60px;
            padding: 32px 24px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .page-header { margin-bottom: 32px; }
        .page-title {
            font-family: var(--mono);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 6px;
        }
        .page-subtitle { font-size: 14px; color: var(--muted); }

        .ticker-strip {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .ticker-btn {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 700;
            padding: 8px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.5px;
        }
        .ticker-btn:hover { border-color: var(--accent); color: var(--text); }
        .ticker-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* STATUS */
        .status-bar {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 20px;
            min-height: 18px;
        }
        .status-bar .loading { color: var(--accent); }
        .status-bar .error   { color: var(--red); }
        .status-bar .ok      { color: var(--green); }

        /* QUOTE CARD */
        .quote-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 28px;
            display: none;
        }
        .quote-card.visible { display: block; }
        .quote-top {
            display: flex;
            align-items: flex-start;
            gap: 32px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .quote-symbol {
            font-family: var(--mono);
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
        }
        .quote-name { font-size: 14px; color: var(--muted); margin-top: 6px; }
        .quote-price {
            font-family: var(--mono);
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1;
        }
        .quote-change {
            font-family: var(--mono);
            font-size: 16px;
            font-weight: 600;
            margin-top: 6px;
        }
        .quote-meta {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        .meta-item { display: flex; flex-direction: column; gap: 4px; }
        .meta-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
        .meta-value { font-family: var(--mono); font-size: 15px; font-weight: 600; }

        /* TABLE */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-x: auto;
            display: none;
        }
        .table-wrap.visible { display: block; }
        .table-title {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 20px 0;
        }

        table { width: 100%; border-collapse: collapse; }
        thead { border-bottom: 1px solid var(--border-bright); }
        th {
            text-align: right;
            padding: 12px 16px;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
        }
        th:first-child { text-align: left; }
        td {
            padding: 11px 16px;
            font-family: var(--mono);
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            text-align: right;
            white-space: nowrap;
        }
        td:first-child { text-align: left; color: var(--muted); }
        tbody tr:hover { background: rgba(59,130,246,0.04); }
        tbody tr:last-child td { border-bottom: none; }

        .up   { color: var(--green); }
        .down { color: var(--red); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="index.html" class="logo">Joseph Lurie</a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="stocks.html">Stocks</a>
        <a href="data.html" class="active">Data</a>
    </div>
</nav>

<main class="main-content">
    <div class="page-header">
        <h1 class="page-title">Data</h1>
        <p class="page-subtitle">Live market data via Alpha Vantage · Select a ticker to load</p>
    </div>

    <div class="ticker-strip" id="tickerStrip"></div>

    <div class="status-bar" id="statusBar"></div>

    <div class="quote-card" id="quoteCard">
        <div class="quote-top">
            <div>
                <div class="quote-symbol" id="qSymbol"></div>
                <div class="quote-name"   id="qName"></div>
            </div>
            <div>
                <div class="quote-price"  id="qPrice"></div>
                <div class="quote-change" id="qChange"></div>
            </div>
        </div>
        <div class="quote-meta" id="qMeta"></div>
    </div>

    <div class="table-wrap" id="tableWrap">
        <div class="table-title" id="tableTitle"></div>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Open</th>
                    <th>High</th>
                    <th>Low</th>
                    <th>Close</th>
                    <th>Volume</th>
                    <th>Change</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<script>
    const API_KEY = '0PYR9XJ22Q2SWHY1';

    const TICKERS = [
        { symbol: 'LMT',  name: 'Lockheed Martin'        },
        { symbol: 'NOC',  name: 'Northrop Grumman'       },
        { symbol: 'RTX',  name: 'RTX Corporation'         },
        { symbol: 'GD',   name: 'General Dynamics'        },
        { symbol: 'BA',   name: 'Boeing'                  },
        { symbol: 'GE',   name: 'GE Aerospace'            },
        { symbol: 'LHX',  name: 'L3Harris Technologies'   },
        { symbol: 'KTOS', name: 'Kratos Defense'          },
        { symbol: 'AVAV', name: 'AeroVironment'           },
        { symbol: 'RKLB', name: 'Rocket Lab'              },
    ];

    const strip     = document.getElementById('tickerStrip');
    const statusBar = document.getElementById('statusBar');
    const quoteCard = document.getElementById('quoteCard');
    const tableWrap = document.getElementById('tableWrap');
    const tableBody = document.getElementById('tableBody');

    let activeSymbol = null;

    TICKERS.forEach(t => {
        const btn = document.createElement('button');
        btn.className    = 'ticker-btn';
        btn.textContent  = t.symbol;
        btn.dataset.symbol = t.symbol;
        btn.addEventListener('click', () => loadStock(t.symbol, t.name, btn));
        strip.appendChild(btn);
    });

    function setStatus(msg, type = '') {
        statusBar.innerHTML = `<span class="${type}">${msg}</span>`;
    }

    function fmt(n, dec = 2) {
        return Number(n).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
    }

    function fmtVol(v) {
        const n = Number(v);
        if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
        if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
        return n.toLocaleString();
    }

    async function loadStock(symbol, name, btn) {
        if (activeSymbol === symbol) return;
        activeSymbol = symbol;

        document.querySelectorAll('.ticker-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        quoteCard.classList.remove('visible');
        tableWrap.classList.remove('visible');
        setStatus(`Fetching ${symbol}…`, 'loading');

        try {
            const url  = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&outputsize=compact&apikey=${API_KEY}`;
            const res  = await fetch(url);
            const data = await res.json();

            if (data['Note'] || data['Information']) {
                setStatus('API rate limit reached. Try again later.', 'error');
                activeSymbol = null;
                btn.classList.remove('active');
                return;
            }

            const meta   = data['Meta Data'];
            const series = data['Time Series (Daily)'];
            if (!series) throw new Error('Unexpected API response');

            const dates     = Object.keys(series).sort((a, b) => b.localeCompare(a));
            const latest    = series[dates[0]];
            const prev      = series[dates[1]];
            const close     = parseFloat(latest['4. close']);
            const prevClose = parseFloat(prev['4. close']);
            const change    = close - prevClose;
            const changePct = (change / prevClose) * 100;
            const isUp      = change >= 0;

            document.getElementById('qSymbol').textContent = symbol;
            document.getElementById('qName').textContent   = name;
            document.getElementById('qPrice').textContent  = '$' + fmt(close);

            const changeEl = document.getElementById('qChange');
            changeEl.textContent = `${isUp ? '+' : ''}${fmt(change)} (${isUp ? '+' : ''}${fmt(changePct)}%)`;
            changeEl.className   = 'quote-change ' + (isUp ? 'up' : 'down');

            document.getElementById('qMeta').innerHTML = [
                { label: 'Open',         value: '$' + fmt(latest['1. open'])  },
                { label: 'High',         value: '$' + fmt(latest['2. high'])  },
                { label: 'Low',          value: '$' + fmt(latest['3. low'])   },
                { label: 'Volume',       value: fmtVol(latest['5. volume'])   },
                { label: 'Last Updated', value: dates[0]                      },
                { label: 'Data Points',  value: dates.length + ' days'        },
            ].map(f => `
                <div class="meta-item">
                    <span class="meta-label">${f.label}</span>
                    <span class="meta-value">${f.value}</span>
                </div>
            `).join('');

            quoteCard.classList.add('visible');

            document.getElementById('tableTitle').textContent = `${symbol} · Daily Price History`;
            tableBody.innerHTML = '';

            dates.forEach((date, i) => {
                const row   = series[date];
                const c     = parseFloat(row['4. close']);
                let dayChange = '', dayClass = '';

                if (i < dates.length - 1) {
                    const prevC = parseFloat(series[dates[i + 1]]['4. close']);
                    const diff  = c - prevC;
                    const pct   = (diff / prevC) * 100;
                    dayClass    = diff >= 0 ? 'up' : 'down';
                    dayChange   = `${diff >= 0 ? '+' : ''}${fmt(diff)} (${diff >= 0 ? '+' : ''}${fmt(pct)}%)`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${date}</td>
                    <td>$${fmt(row['1. open'])}</td>
                    <td>$${fmt(row['2. high'])}</td>
                    <td>$${fmt(row['3. low'])}</td>
                    <td>$${fmt(c)}</td>
                    <td>${fmtVol(row['5. volume'])}</td>
                    <td class="${dayClass}">${dayChange}</td>
                `;
                tableBody.appendChild(tr);
            });

            tableWrap.classList.add('visible');
            setStatus(`✓ ${symbol} loaded · ${dates.length} trading days · last updated ${meta['3. Last Refreshed']}`, 'ok');

        } catch (err) {
            setStatus('Error: ' + err.message, 'error');
            activeSymbol = null;
            btn.classList.remove('active');
        }
    }
</script>

</body>
</html>
