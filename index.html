<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joseph Lurie - Financial Markets Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0a0e27;
            color: #e4e4e7;
        }

        .top-nav {
            background-color: #151a30;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid #1e2542;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #3b82f6;
            margin-right: 40px;
            text-decoration: none;
        }

        .search-bar {
            flex: 1;
            max-width: 500px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 16px;
            background-color: #1e2542;
            border: 1px solid #2d3548;
            border-radius: 6px;
            color: #e4e4e7;
            font-size: 14px;
        }

        .search-bar input::placeholder {
            color: #6b7280;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            margin-left: auto;
        }

        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="logo">Joseph Lurie</a>
        <div class="search-bar">
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="stocks.html">Stocks</a>
        </div>
    </nav>
    <div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 60px); margin-top: 60px;">
        <div style="text-align: center;">
            <h1 style="font-size: 48px; font-weight: 700; margin-bottom: 16px; color: #3b82f6;">Joseph Lurie</h1>
            <p style="font-size: 18px; color: #9ca3af; margin-bottom: 24px;">Financial Markets Dashboard</p>
            <a href="stocks.html" style="display: inline-block; padding: 12px 24px; background-color: #3b82f6; color: white; text-decoration: none; border-radius: 6px; font-weight: 600;">View Stocks</a>
        </div>
    </div>
</body>
</html>
